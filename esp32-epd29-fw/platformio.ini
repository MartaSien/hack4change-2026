[env:esp32_epd29]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.19.4
    https://gitlab.com/doomhammerng/wifi-manager#rpi-picow
    ropg/ezTime@^0.8.3
    zinggjm/GxEPD2@^1.6.9
